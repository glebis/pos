name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - name: Test
        run: uv run pytest -q

  raycast:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: raycast
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: raycast/package-lock.json
      - run: npm ci
      - run: npm test
